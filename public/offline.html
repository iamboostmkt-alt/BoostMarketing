<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — Weeklink</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #07070A;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
    }
    .icon { font-size: 64px; }
    h1 { font-size: 20px; font-weight: 700; }
    p { font-size: 14px; color: rgba(255,255,255,0.4); text-align: center; max-width: 280px; }
    button {
      margin-top: 8px;
      padding: 12px 24px;
      background: #8B5CF6;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Sin conexión</h1>
  <p>Weeklink necesita internet. Conéctate y vuelve a intentarlo.</p>
  <button onclick="window.location.reload()">Reintentar</button>
</body>
</html>
